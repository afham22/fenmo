services:
  # Database Service
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fenmo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Backend Service
  backend:
    build:
      context: ./fenmo-be
      dockerfile: Dockerfile
    container_name: fenmo_backend
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=admin
      - DB_PASSWORD=password
      - DB_NAME=fenmo_db
    ports:
      - "3000:3000"
    volumes:
      - /app/node_modules
    command: npm run start:prod

  # Frontend Service
  frontend:
    build:
      context: ./fenmo-fe
      dockerfile: Dockerfile
    container_name: fenmo_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    volumes:
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data: